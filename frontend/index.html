  <div id="root">
    <div id="app-boot"
      style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;background:linear-gradient(180deg,#0f172a 0%,#111827 100%);color:#fff;font-family:Manrope,Outfit,system-ui,sans-serif;">

          style="margin:0 auto 20px;display:flex;height:72px;width:72px;align-items:center;justify-content:center;border-radius:24px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);box-shadow:0 24px 80px rgba(15,23,42,0.35);">

          style="margin:0 0 10px;font-size:12px;font-weight:700;letter-spacing:0.32em;text-transform:uppercase;color:rgba(125,211,252,0.92);">
          Zyro
        </p>
        <h1 style="margin:0 0 12px;font-size:30px;line-height:1.1;font-weight:800;letter-spacing:-0.03em;">
          Loading your social experience
        </h1>
        <p id="app-boot-status" style="margin:0 auto;max-width:320px;font-size:14px;line-height:1.7;color:rgba(226,232,240,0.78);">
          Connecting to the app and preparing the interface.
        </p>
        <div
          style="margin:24px auto 0;display:inline-flex;align-items:center;gap:10px;border-radius:999px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);padding:12px 18px;font-size:14px;font-weight:600;color:rgba(226,232,240,0.9);">
          <span
            style="display:inline-block;height:14px;width:14px;border:2px solid rgba(255,255,255,0.35);border-top-color:#7dd3fc;border-radius:999px;animation:zyro-boot-spin 0.8s linear infinite;"></span>
          Please wait
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes zyro-boot-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    window.setTimeout(() => {
      const status = document.getElementById("app-boot-status");
      if (status) {
        status.textContent = "Still loading. If this takes more than a few seconds, refresh the page or restart the dev server.";
      }
    }, 6000);

    (function () {
      const hash = window.location.hash || "";
      const search = window.location.search || "";
      const combined = hash + search;

      if (!combined.includes("access_token=") && !combined.includes("credential=")) return;

      const params = new URLSearchParams(combined.replace("#", "?").substring(1));
      const accessToken = params.get("access_token");
      const credential = params.get("credential");

      if ((accessToken || credential) && window.opener) {
        window.opener.postMessage({
          type: "GOOGLE_OAUTH_TOKEN",
          token: accessToken,
          credential: credential
        }, "*");

        if (accessToken) localStorage.setItem("google_auth_token", accessToken);
        if (credential) localStorage.setItem("google_auth_credential", credential);

        document.body.innerHTML = `
          <div style='display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;background:#000;color:#fff;'>
            <div style='border:4px solid #fff;border-top-color:transparent;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;'></div>
            <h2 style='margin-top:20px;letter-spacing:1px;text-transform:uppercase;font-size:14px;'>Connecting Account...</h2>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          </div>
        `;

        setTimeout(() => window.close(), 400);
      }
    })();
  </script>
