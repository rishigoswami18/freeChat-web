  <div id="root"></div>
  <script>
    /**
     * CENTRAL OAUTH HANDLER (v2.0)
     * Handles popups for Google Sign-In and One Tap.
     */
    (function () {
      const hash = window.location.hash || "";
      const search = window.location.search || "";
      const combined = hash + search;

      if (!combined.includes("access_token=") && !combined.includes("credential=")) return;

      const params = new URLSearchParams(combined.replace("#", "?").substring(1));
      const accessToken = params.get("access_token");
      const credential = params.get("credential");

      if ((accessToken || credential) && window.opener) {
        // 🚀 BLAZING FAST MESSAGE PASSING
        window.opener.postMessage({
          type: "GOOGLE_OAUTH_TOKEN",
          token: accessToken,
          credential: credential
        }, "*");

        // --- Persistent Backup (in case message fails) ---
        if (accessToken) localStorage.setItem("google_auth_token", accessToken);
        if (credential) localStorage.setItem("google_auth_credential", credential);

        // --- Visual Feedback ---
        document.body.innerHTML = `
          <div style='display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;background:#000;color:#fff;'>
            <div style='border:4px solid #fff;border-top-color:transparent;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;'></div>
            <h2 style='margin-top:20px;letter-spacing:1px;text-transform:uppercase;font-size:14px;'>Connecting Account...</h2>
            <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
          </div>
        `;

        // Direct self-close
        setTimeout(() => window.close(), 400);
      }
    })();
  </script>
