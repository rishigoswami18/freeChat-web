services:
  # Main Full-Stack Application (Front-end + Back-end)
  - type: web
    name: freechat-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      # Note: HF_TOKEN and other secrets should be added via Render Dashboard UI
